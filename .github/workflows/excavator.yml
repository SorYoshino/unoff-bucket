name: Excavator

on:
  workflow_dispatch:
  schedule:
    # Runs at 45 minutes past the hour, every 3 hours
    - cron: '45 */3 * * *'

permissions:
  contents: write

jobs:
  excavate:
    name: Excavate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Excavate
        uses: ScoopInstaller/GithubActions@main
        env:
          SCOOP_REPO: https://github.com/SorYoshino/Scoop
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOOP_BRANCH: unofficial
          SKIP_UPDATED: 1
